name: Weirdo Tracker Data Pipeline

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  collect-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install deps
      run: pip install requests
    
    - name: Create dirs
      run: mkdir -p data config
    
    - name: Run Research
      id: research
      run: |
        echo "Running Research Agent..."
        python3 agents/research_agent.py || echo "Research failed"
      continue-on-error: true
    
    - name: Run Thinking
      id: thinking
      run: |
        echo "Running Thinking Agent..."
        python3 agents/thinking_agent.py || echo "Thinking failed"
      continue-on-error: true
    
    - name: Run Alert Agent
      id: alert
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        echo "Running Alert Agent..."
        python3 agents/alert_agent.py || echo "Alert failed"
      continue-on-error: true
    
    - name: Run Whale Activity
      id: whale
      run: |
        echo "Running Whale Activity Agent..."
        python3 agents/whale_activity_agent.py || echo "Whale failed"
      continue-on-error: true
    
    - name: Run Thinking
      id: thinking
      run: |
        echo "Running Thinking Agent..."
        python3 agents/thinking_agent.py || echo "Thinking failed"
      continue-on-error: true
    
    - name: Commit data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/ || true
        git diff --staged --quiet || git commit -m "Auto-update data"
        git push || true
