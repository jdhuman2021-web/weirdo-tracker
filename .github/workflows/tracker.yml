name: Weirdo Tracker Data Pipeline

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  collect-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install deps
      run: |
        pip install requests supabase
    
    - name: Create dirs
      run: mkdir -p data config
    
    - name: Run Research
      id: research
      run: |
        echo "Running Research Agent..."
        echo "Config tokens count: $(cat config/tokens.json | jq '.tokens | length')"
        python3 agents/research_agent.py 2>&1 | tee research.log
        echo "Research exit code: $?"
        cat data/latest.json 2>/dev/null | jq '.metadata' || echo "No latest.json"
      continue-on-error: true
    
    - name: Run Whale Activity
      id: whale
      run: |
        echo "Running Whale Activity Agent..."
        python3 agents/whale_activity_agent.py || echo "Whale failed"
      continue-on-error: true
    
    - name: Run Thinking (with whale data)
      id: thinking
      run: |
        echo "Running Thinking Agent..."
        python3 agents/thinking_agent.py || echo "Thinking failed"
      continue-on-error: true
    
    - name: Run Alert Agent
      id: alert
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        echo "Running Alert Agent..."
        python3 agents/alert_agent.py || echo "Alert failed"
      continue-on-error: true
    
    - name: Commit data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        echo "Files in data/:"
        ls -la data/
        echo "Latest.json metadata:"
        cat data/latest.json | jq '.metadata' 2>/dev/null || echo "No latest.json"
        git add data/ || true
        git status
        git diff --staged --quiet || git commit -m "Auto-update data: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        git push || true
        echo "Push exit code: $?"
