name: Squirmy Screener Data Pipeline

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  collect-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install deps
      run: |
        pip install requests supabase
    
    - name: Create dirs
      run: mkdir -p data config
    
    - name: Run Research Agent
      id: research
      run: |
        echo "=== Running Research Agent v1.5 ==="
        echo "Config tokens: $(jq '.tokens | length' config/tokens.json)"
        python3 agents/research_agent.py 2>&1 | tee research.log
        exit_code=$?
        echo "Research exit code: $exit_code"
        if [ -f data/latest.json ]; then
          echo "Latest.json metadata:"
          jq '.metadata' data/latest.json
        else
          echo "ERROR: No latest.json created"
        fi
        exit $exit_code
      continue-on-error: true
    
    - name: Run Whale Tracking Agent
      id: whale
      run: |
        echo "=== Running Whale Tracking Agent v1.0 ==="
        python3 agents/whale_agent.py 2>&1 | tee whale.log
        exit_code=$?
        echo "Whale agent exit code: $exit_code"
        if [ -f data/whale_activity.json ]; then
          echo "Whale activity summary:"
          jq '.metadata' data/whale_activity.json
        fi
        exit $exit_code
      continue-on-error: true
    
    - name: Run Thinking Agent
      id: thinking
      run: |
        echo "=== Running Thinking Agent v2.4 ==="
        python3 agents/thinking_agent.py 2>&1 | tee thinking.log
        exit_code=$?
        echo "Thinking agent exit code: $exit_code"
        if [ -f data/opportunities.json ]; then
          echo "Opportunities summary:"
          jq '.metadata' data/opportunities.json
        fi
        exit $exit_code
      continue-on-error: true
    
    - name: Run Jupiter Price Agent
      id: jupiter
      run: |
        echo "=== Running Jupiter Price Agent v1.0 ==="
        python3 agents/jupiter_agent.py 2>&1 | tee jupiter.log
        exit_code=$?
        echo "Jupiter agent exit code: $exit_code"
        if [ -f data/jupiter_prices.json ]; then
          echo "Jupiter prices:"
          jq '{successful, failed, timestamp: .timestamp}' data/jupiter_prices.json
        fi
        exit $exit_code
      continue-on-error: true
    
    - name: Run Backtest Agent
      id: backtest
      run: |
        echo "=== Running Backtest Agent v1.0 ==="
        python3 agents/backtest_agent.py 2>&1 | tee backtest.log
        exit_code=$?
        echo "Backtest agent exit code: $exit_code"
        if [ -f data/backtest_results.json ]; then
          echo "Backtest results:"
          jq '.' data/backtest_results.json
        fi
        exit $exit_code
      continue-on-error: true
    
    - name: Run Alert Agent
      id: alert
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        echo "=== Running Alert Agent ==="
        python3 agents/alert_agent.py 2>&1 | tee alert.log
        exit_code=$?
        echo "Alert agent exit code: $exit_code"
        exit $exit_code
      continue-on-error: true
    
    - name: Commit and Push Data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        echo "=== Data Files ==="
        ls -la data/ 2>/dev/null || echo "No data directory"
        
        echo "=== Committing Changes ==="
        git add data/ 2>/dev/null || true
        git add config/ 2>/dev/null || true
        
        git status
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git commit -m "Auto-update data: $timestamp"
          git push || echo "Push failed (may be up to date)"
        fi
    
    - name: Pipeline Summary
      run: |
        echo "=== Pipeline Summary ==="
        echo "Research Agent: ${{ steps.research.outcome }}"
        echo "Whale Agent: ${{ steps.whale.outcome }}"
        echo "Thinking Agent: ${{ steps.thinking.outcome }}"
        echo "Backtest Agent: ${{ steps.backtest.outcome }}"
        echo "Alert Agent: ${{ steps.alert.outcome }}"
        
        if [ -f data/latest.json ]; then
          echo ""
          echo "=== Tokens Fetched ==="
          jq '.metadata.tokens_fetched' data/latest.json
        fi
        
        if [ -f data/opportunities.json ]; then
          echo ""
          echo "=== Score Distribution ==="
          jq '.metadata | {strong_buys, buys, speculative, watch, avoid}' data/opportunities.json
        fi
        
        if [ -f data/backtest_results.json ]; then
          echo ""
          echo "=== Backtest Status ==="
          jq '{snapshot_count, has_24h_data, has_7d_data}' data/backtest_results.json
        fi