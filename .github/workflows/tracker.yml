name: Squirmy Screener Data Pipeline

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  collect-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install deps
      run: |
        pip install requests supabase
    
    - name: Create dirs
      run: mkdir -p data config
    
    - name: Run Consolidated Pipeline
      id: pipeline
      run: |
        echo "=== Running Collect and Score v1.0 ==="
        echo "Pipeline: Research → Helius → Whale → Thinking → Backtest → Alert"
        python3 agents/collect_and_score.py 2>&1 | tee pipeline.log
        exit_code=$?
        echo "Pipeline exit code: $exit_code"
        
        # Extract summary
        if [ -f data/opportunities.json ]; then
          echo "=== Score Distribution ==="
          jq '.metadata | {strong_buys, buys, speculative, watch, avoid}' data/opportunities.json
        fi
        
        exit $exit_code
    
    - name: Commit and Push Data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        echo "=== Data Files ==="
        ls -la data/ 2>/dev/null || echo "No data directory"
        
        echo "=== Committing Changes ==="
        git add data/ 2>/dev/null || true
        git add config/ 2>/dev/null || true
        
        git status
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git commit -m "Auto-update data: $timestamp"
          git push || echo "Push failed (may be up to date)"
        fi
    
    - name: Pipeline Summary
      run: |
        echo "=== Pipeline Summary ==="
        echo "Result: ${{ steps.pipeline.outcome }}"
        
        if [ -f data/latest.json ]; then
          echo ""
          echo "=== Tokens Fetched ==="
          jq '.metadata.tokens_fetched' data/latest.json
        fi
        
        if [ -f data/opportunities.json ]; then
          echo ""
          echo "=== Score Distribution ==="
          jq '.metadata | {strong_buys, buys, speculative, watch, avoid}' data/opportunities.json
        fi
        
        if [ -f data/alerts.json ]; then
          echo ""
          echo "=== Alerts ==="
          jq '{total: .total_alerts, sent: .alerts_sent}' data/alerts.json
        fi