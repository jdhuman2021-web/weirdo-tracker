# Research Agent - Supabase Integration
# Fetches token data and writes to cloud database

name: Research Agent

on:
  workflow_call:
    outputs:
      tokens_count:
        description: 'Number of tokens fetched'
        value: ${{ steps.research.outputs.tokens_count }}

jobs:
  research:
    runs-on: ubuntu-latest
    outputs:
      tokens_count: ${{ steps.research.outputs.tokens_count }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests supabase
      
      - name: Run Research Agent
        id: research
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python agents/research_agent.py
          
          # Get token count
          TOKENS=$(python -c "import json; print(len(json.load(open('data/latest.json'))['raw_data']))")
          echo "tokens_count=$TOKENS" >> $GITHUB_OUTPUT
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: research-data
          path: |
            data/latest.json
            config/tokens.json