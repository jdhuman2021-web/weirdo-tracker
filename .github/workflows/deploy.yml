name: Deploy Dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'dashboard/**'
      - 'index.html'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Deploy to Surge
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          npm install -g surge
          echo "Deploying dashboard..."
          surge ./dashboard https://squirmyscreener.surge.sh --token $SURGE_TOKEN
