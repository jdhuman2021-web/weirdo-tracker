            margin-bottom: 20px;
            display: none;
        }

            display: block;
            animation: slideIn 0.3s ease;

        }

        .alert-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
        }

            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
        }

            gap: 15px;
            margin-bottom: 20px;
        }

            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 15px;
            position: relative;

            oscillator.start(audioCtx.currentTime);

            const grid = document.getElementById('walletGrid');
            grid.innerHTML = WHALE_WALLETS.map(wallet => {
                const shortAddress = wallet.address.substring(0, 8) + '...' + wallet.address.substring(wallet.address.length - 4);
                return `
                    <div class="wallet-card" id="wallet-${wallet.address.substring(0, 8)}">
                        <div class="wallet-header">
                            <div>
                                <div class="wallet-name">${wallet.emoji} ${wallet.name}</div>
                                <div class="wallet-address">${shortAddress}</div>
                            </div>
                            <div class="wallet-status" id="status-${wallet.address.substring(0, 8)}">Holding</div>
                        </div>
                        <div class="recent-activity" id="activity-${wallet.address.substring(0, 8)}">
                            <div style="color: #666; font-size: 0.85em;">No recent activity</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Simulate wallet activity
        function simulateActivity() {
            const now = new Date().toLocaleTimeString();
            const activeWallets = [];
            
            // Randomly select 1-5 wallets to show activity
            const numActive = Math.floor(Math.random() * 5) + 1;
            const selectedWallets = [];
            
            for (let i = 0; i < numActive; i++) {
                const wallet = WHALE_WALLETS[Math.floor(Math.random() * WHALE_WALLETS.length)];
                if (!selectedWallets.find(w => w.address === wallet.address)) {
                    selectedWallets.push(wallet);
                }
            }
            
            selectedWallets.forEach(wallet => {
                const token = TOKEN_NAMES[Math.floor(Math.random() * TOKEN_NAMES.length)];
                const action = Math.random() > 0.3 ? 'buy' : 'sell';
                const amount = (Math.random() * 10 + 0.1).toFixed(2);
                const price = (Math.random() * 0.01).toFixed(6);
                
                const activityHTML = `
                    <div class="activity-item ${action}">
                        <span>${action.toUpperCase()} ${amount} ${token} @ $${price}</span>
                        <span class="timestamp">${now}</span>
                    </div>
                `;
                
                const activityDiv = document.getElementById(`activity-${wallet.address.substring(0, 8)}`);
                if (activityDiv) {
                    activityDiv.innerHTML = activityHTML + activityDiv.innerHTML.substring(0, 200);
                }
                
                const card = document.getElementById(`wallet-${wallet.address.substring(0, 8)}`);
                const status = document.getElementById(`status-${wallet.address.substring(0, 8)}`);
                
                if (card && status) {
                    if (action === 'buy') {
                        card.classList.add('buy');
                        card.classList.remove('sell');
                        status.className = 'wallet-status buying';
                        status.textContent = 'BUYING 🔥';
                        activeWallets.push({ wallet, token, amount, action });
                    } else {
                        card.classList.add('sell');
                        card.classList.remove('buy');
                        status.className = 'wallet-status selling';
                        status.textContent = 'SELLING';
                    }
                    
                    setTimeout(() => {
                        card.classList.remove('buy', 'sell');
                        status.className = 'wallet-status holding';
                        status.textContent = 'Holding';
                    }, 5000);
                }
            });
            
            // Update concentration chart
            updateConcentrationChart();
            
            // Check alert threshold
            const threshold = parseInt(document.getElementById('alertThreshold').value);
            if (activeWallets.filter(w => w.action === 'buy').length >= threshold) {
                triggerAlert(activeWallets);
            }
            
            // Update stats
            document.getElementById('activeAlerts').textContent = `🚨 Active: ${activeWallets.filter(w => w.action === 'buy').length}`;
            document.getElementById('lastScan').textContent = `🔄 Last Scan: ${now}`;
        }

        function triggerAlert(activeWallets) {
            const alertSection = document.getElementById('alertSection');
            const alertContent = document.getElementById('alertContent');
            
            const buyWallets = activeWallets.filter(w => w.action === 'buy');
            
            alertContent.innerHTML = buyWallets.map(w => `
                <div class="alert-item">
                    <div>
                        <strong>${w.wallet.name}</strong> bought ${w.amount} ${w.token}
                    </div>
                    <button class="btn" style="padding: 5px 15px; font-size: 0.8em;"
                            onclick="viewToken('${w.token}')">View</button>
                </div>
            `).join('');
            
            alertSection.classList.add('active');
            playAlertSound('buy');
            
            // Auto-dismiss after 15 seconds
            setTimeout(() => {
                alertSection.classList.remove('active');
            }, 15000);
        }

        function updateConcentrationChart() {
            // Count token mentions in activities
            const tokenCounts = {};
            TOKEN_NAMES.forEach(t => tokenCounts[t] = Math.floor(Math.random() * 20) + 5);
            
            const sortedTokens = Object.entries(tokenCounts).sort((a, b) => b[1] - a[1]).slice(0, 10);
            const maxCount = sortedTokens[0][1];
            
            const chartHTML = sortedTokens.map(([token, count]) => `
                <div class="token-bar">
                    <div class="token-name">${token}</div>
                    <div class="token-bar-fill">
                        <div class="token-fill" style="width: ${(count / maxCount) * 100}%"></div>
                    </div>
                    <div class="token-count">${count} whales</div>
                </div>
            `).join('');
            
            document.getElementById('concentrationChart').innerHTML = chartHTML;
        }

        function startMonitoring() {
            if (monitoringInterval) return;
            
            const interval = parseInt(document.getElementById('scanInterval').value) * 1000;
            document.getElementById('scanStatus').textContent = '▶️ Status: Running';
            
            monitoringInterval = setInterval(simulateActivity, interval);
            simulateActivity(); // Run immediately
        }

        function stopMonitoring() {
            if (monitoringInterval) {
                clearInterval(monitoringInterval);
                monitoringInterval = null;
            }
            document.getElementById('scanStatus').textContent = '⏸️ Status: Paused';
        }

        function testAlert() {
            triggerAlert([
                { wallet: WHALE_WALLETS[0], token: 'PUNCH', amount: '5.2', action: 'buy' },
                { wallet: WHALE_WALLETS[1], token: 'FISH', amount: '10.5', action: 'buy' },
                { wallet: WHALE_WALLETS[2], token: 'RAINBOW', amount: '3.8', action: 'buy' }
            ]);
        }

        function viewToken(token) {
            window.open(`https://dexscreener.com/solana/?q=${token}`, '_blank');
        }

        // Initialize
        initializeWalletCards();
        updateConcentrationChart();
        
        // Auto-start
        startMonitoring();
    </script>
</body>
</html>
