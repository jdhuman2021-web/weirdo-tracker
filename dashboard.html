<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weirdo Portfolio Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d0d;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px;
            border: 1px solid #2a2a4a;
        }
        .header h1 { 
            font-size: 28px; 
            color: #fff;
            margin-bottom: 8px;
        }
        .header p { color: #888; font-size: 14px; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #2a2a4a;
        }
        .stat-card .value { font-size: 24px; font-weight: bold; color: #4ade80; }
        .stat-card .label { font-size: 12px; color: #888; margin-top: 5px; }
        
        .filters-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            color: #888;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .filter-btn:hover { border-color: #4ade80; color: #4ade80; }
        .filter-btn.active { background: #4ade80; color: #000; border-color: #4ade80; }
        
        .tokens-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 15px;
        }
        
        .token-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2a4a;
            transition: transform 0.2s, border-color 0.2s;
        }
        .token-card:hover { transform: translateY(-2px); border-color: #4ade80; }
        .token-card.failed { opacity: 0.5; }
        
        .token-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .token-name { font-size: 18px; font-weight: bold; color: #fff; }
        .token-symbol { 
            background: #4ade80; 
            color: #000; 
            padding: 3px 10px; 
            border-radius: 12px; 
            font-size: 12px; 
            font-weight: bold;
        }
        .token-source { font-size: 11px; color: #666; margin-top: 4px; }
        
        .token-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .token-metric { text-align: center; }
        .token-metric .value { font-size: 16px; font-weight: 600; color: #fff; }
        .token-metric .label { font-size: 11px; color: #666; }
        
        .price-change {
            text-align: center;
            padding: 10px;
            margin: 15px 0;
            border-radius: 8px;
            font-weight: bold;
        }
        .price-change.positive { background: rgba(74, 222, 128, 0.15); color: #4ade80; }
        .price-change.negative { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        
        .narrative {
            font-size: 12px;
            color: #888;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #2a2a4a;
            line-height: 1.5;
        }
        
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        .status-badge.active { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
        .status-badge.failed { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        
        .alert-box {
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid #4ade80;
            padding: 10px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 12px;
            color: #4ade80;
        }
        
        @media (max-width: 600px) {
            .tokens-grid { grid-template-columns: 1fr; }
            .stats { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div class="filters-bar">
        <button class="filter-btn active" onclick="filterTokens('all')">All</button>

            },

        function formatNum(n) {
            if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
            if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
            return n.toString();
        }
        
        function formatAge(days) {
            if (days < 1) return Math.round(days*24) + 'h';
            if (days < 30) return Math.round(days) + 'd';
            return Math.round(days/30) + 'mo';
        }
        
        function renderTokens(filter = 'all') {
            const grid = document.getElementById('tokensGrid');
            let filtered = tokens;
            
            if (filter === 'active') filtered = tokens.filter(t => t.status === 'active');
            if (filter === 'alerts') filtered = tokens.filter(t => t.alert);
            
            grid.innerHTML = filtered.map(t => `
                <div class="token-card ${t.status}">
                    <div class="token-header">
                        <div>
                            <div class="token-name">${t.name}</div>
                            <div class="token-source">${t.source} • ${formatAge(t.age_days)} old</div>
                        </div>
                        <span class="status-badge ${t.status}">${t.status.toUpperCase()}</span>
                    </div>
                    
                    <div class="token-grid">
                        <div class="token-metric">
                            <div class="value">$${formatNum(t.market_cap)}</div>
                            <div class="label">Market Cap</div>
                        </div>
                        <div class="token-metric">
                            <div class="value">$${formatNum(t.liquidity)}</div>
                            <div class="label">Liquidity</div>
                        </div>
                        <div class="token-metric">
                            <div class="value">$${formatNum(t.volume_24h)}</div>
                            <div class="label">24h Volume</div>
                        </div>
                        <div class="token-metric">
                            <div class="value">${formatNum(t.holders)}</div>
                            <div class="label">Holders</div>
                        </div>
                    </div>
                    
                    <div class="price-change ${t.price_change_24h >= 0 ? 'positive' : 'negative'}">
                        ${t.price_change_24h >= 0 ? '▲' : '▼'} ${Math.abs(t.price_change_24h).toFixed(1)}% (24h)
                    </div>
                    
                    ${t.alert ? `<div class="alert-box">${t.alert}</div>` : ''}
                    
                    <div class="narrative">${t.narrative}</div>
                </div>
            `).join('');
        }
        
        function filterTokens(type) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderTokens(type);
        }
        
        renderTokens();
    </script>
</body>
</html>
