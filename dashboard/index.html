<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weirdo Tracker Dashboard</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #0a0b0d; color: #e8eaf0; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; color: #00ff88; }
        .last-updated { color: #6b7280; font-size: 14px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .card { background: #14171d; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 16px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .symbol { font-weight: 700; font-size: 18px; }
        .score { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .score-hot { background: rgba(0,255,136,0.1); color: #00ff88; border: 1px solid rgba(0,255,136,0.3); }
        .score-warm { background: rgba(255,165,2,0.1); color: #ffa502; border: 1px solid rgba(255,165,2,0.3); }
        .score-cold { background: rgba(255,71,87,0.1); color: #ff4757; border: 1px solid rgba(255,71,87,0.3); }
        .price { font-family: monospace; font-size: 14px; color: #6b7280; }
        .change { font-family: monospace; font-weight: 700; }
        .change.up { color: #00ff88; }
        .change.down { color: #ff4757; }
        .reasons { font-size: 12px; color: #9ca3af; margin-top: 8px; }
        .loading { text-align: center; padding: 40px; color: #6b7280; }
        .error { text-align: center; padding: 40px; color: #ff4757; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧠 Weirdo Tracker Dashboard</h1>
        <div class="last-updated" id="lastUpdated">Loading...</div>
    </div>
    
    <div id="opportunities" class="grid">
        <div class="loading">Loading opportunities...</div>
    </div>

    <script>
        async function loadData() {
            try {
                // Fetch opportunities.json from GitHub repo
                const response = await fetch('https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/data/opportunities.json');
                
                if (!response.ok) {
                    throw new Error('Data not available');
                }
                
                const data = await response.json();
                renderOpportunities(data);
                
                document.getElementById('lastUpdated').textContent = 
                    'Last updated: ' + new Date(data.metadata.timestamp).toLocaleString();
                    
            } catch (e) {
                document.getElementById('opportunities').innerHTML = 
                    '<div class="error">⚠️ Data not available. Run the agents first.</div>';
            }
        }
        
        function renderOpportunities(data) {
            const container = document.getElementById('opportunities');
            const opportunities = data.opportunities || [];
            
            if (opportunities.length === 0) {
                container.innerHTML = '<div class="loading">No opportunities found</div>';
                return;
            }
            
            container.innerHTML = opportunities.map(opp => {
                const scoreClass = opp.score >= 80 ? 'score-hot' : opp.score >= 60 ? 'score-warm' : 'score-cold';
                const changeClass = opp.price_change_24h >= 0 ? 'up' : 'down';
                const changeSign = opp.price_change_24h >= 0 ? '+' : '';
                
                return `
                    <div class="card">
                        <div class="card-header">
                            <div class="symbol">${opp.symbol}</div>
                            <div class="score ${scoreClass}">${opp.score}/100</div>
                        </div>
                        <div class="price">$${opp.price_usd?.toFixed(6) || 'N/A'}</div>
                        <div class="change ${changeClass}">${changeSign}${opp.price_change_24h?.toFixed(2) || '0'}% (24h)</div>
                        <div class="reasons">${opp.reasons?.slice(0, 2).join(' • ') || ''}</div>
                    </div>
                `;
            }).join('');
        }
        
        // Load on page load
        loadData();
        
        // Refresh every 5 minutes
        setInterval(loadData, 300000);
    </script>
</body>
</html>
