<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weirdo Tracker | Meme Coin Intelligence</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg-primary: #050505;
            --bg-secondary: #0a0a0a;
            --bg-tertiary: #14171d;
            --border: rgba(255,255,255,0.08);
            --text-primary: #e8eaf0;
            --text-secondary: #6b7280;
            --accent: #00ff88;
            --accent-dim: rgba(0,255,136,0.1);
            --warning: #ffa502;
            --danger: #ff4757;
            --info: #74b9ff;
        }
        
        body {
            font-family: 'SF Mono', system-ui, -apple-system, monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }
        
        /* Dashboard Grid */
        .dashboard {
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            grid-template-rows: 60px 1fr;
            height: 100vh;
        }
        
        /* Header */
        .header {
            grid-column: 1 / -1;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent) 0%, #00cc6a 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.5px;
        }
        
        /* Ticker */
        .ticker {
            display: flex;
            gap: 32px;
            overflow: hidden;
            flex: 1;
            margin: 0 40px;
            mask-image: linear-gradient(90deg, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(90deg, transparent, black 10%, black 90%, transparent);
        }
        
        .ticker-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            white-space: nowrap;
            animation: scroll 30s linear infinite;
        }
        
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        
        .ticker-symbol { font-weight: 600; color: var(--text-primary); }
        .ticker-price { color: var(--text-secondary); }
        .ticker-change { font-weight: 600; }
        .ticker-change.up { color: var(--accent); }
        .ticker-change.down { color: var(--danger); }
        
        /* Status */
        .status {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--accent); }
            50% { opacity: 0.5; box-shadow: 0 0 4px var(--accent); }
        }
        
        .time {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 600;
            font-family: 'SF Mono', monospace;
        }
        
        /* Left Sidebar */
        .sidebar-left {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }
        
        .sort-controls {
            display: flex;
            gap: 4px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .sort-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .sort-btn:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }
        
        .sort-btn.active {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .sort-arrow {
            font-size: 9px;
            margin-left: 2px;
            opacity: 0.7;
        }
        
        .sort-btn.active .sort-arrow {
            opacity: 1;
        }
        
        .token-list {
            overflow-y: auto;
            flex: 1;
        }
        
        .token-list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: all 0.2s;
        }
        
        .token-list-item:hover { 
            background: rgba(255,255,255,0.03); 
        }
        
        .token-list-item.active {
            background: var(--accent-dim);
            border-left: 3px solid var(--accent);
        }
        
        .token-list-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }
        
        .token-list-info { flex: 1; }
        
        .token-list-symbol {
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .signal-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        
        .signal-hot { 
            background: var(--accent); 
            box-shadow: 0 0 6px var(--accent); 
        }
        .signal-warm { background: var(--warning); }
        .signal-cold { background: var(--danger); }
        .signal-neutral { background: var(--info); }
        
        .token-list-price {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: 'SF Mono', monospace;
        }
        
        .token-list-change {
            text-align: right;
            font-size: 13px;
            font-family: 'SF Mono', monospace;
        }
        
        .token-list-change.up { color: var(--accent); }
        .token-list-change.down { color: var(--danger); }
        
        /* Main Content */
        .main {
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chart-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        
        .chart-title {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .chart-title-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent) 0%, #00cc6a 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .chart-title-info h2 {
            font-size: 22px;
            margin: 0 0 4px 0;
        }
        
        .chart-title-info span {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .chart-price { text-align: right; }
        
        .chart-price-main {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            font-family: 'SF Mono', monospace;
        }
        
        .chart-price-change {
            font-size: 14px;
            color: var(--accent);
            font-weight: 600;
        }
        
        .chart-container {
            flex: 1;
            padding: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        .chart-placeholder {
            flex: 1;
            background: linear-gradient(180deg, var(--accent-dim) 0%, transparent 100%);
            border: 1px solid rgba(0,255,136,0.2);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            min-height: 300px;
        }
        
        .chart-placeholder-text {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .chart-placeholder-note {
            color: var(--text-secondary);
            font-size: 12px;
            opacity: 0.7;
        }
        
        /* Chart Stats */
        .chart-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--border);
            margin-top: 16px;
        }
        
        .chart-stat {
            background: var(--bg-secondary);
            padding: 16px;
        }
        
        .chart-stat-label {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        
        .chart-stat-value {
            font-size: 16px;
            font-weight: 600;
            font-family: 'SF Mono', monospace;
        }
        
        /* Right Sidebar */
        .sidebar-right {
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .opportunities-panel {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .panel-title {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .opportunity-card {
            background: var(--accent-dim);
            border: 1px solid rgba(0,255,136,0.2);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .opportunity-card:hover {
            border-color: rgba(0,255,136,0.4);
            transform: translateY(-1px);
        }
        
        .opportunity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .opportunity-symbol {
            font-weight: 700;
            font-size: 15px;
        }
        
        .opportunity-score {
            background: rgba(0,255,136,0.2);
            color: var(--accent);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
        }
        
        .opportunity-reason {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        
        .opportunity-meta {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        /* Alert Feed */
        .alert-feed {
            border-top: 1px solid var(--border);
            padding: 16px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .alert-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        
        .alert-icon { font-size: 14px; }
        
        .alert-content { flex: 1; }
        
        .alert-text {
            font-size: 12px;
            color: var(--text-primary);
            line-height: 1.4;
        }
        
        .alert-time {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        
        /* Loading States */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Error State */
        .error {
            padding: 20px;
            text-align: center;
            color: var(--danger);
        }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .dashboard {
                grid-template-columns: 240px 1fr 280px;
            }
        }
        
        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
            }
            .sidebar-left, .sidebar-right {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">🧠</div>
                <div class="logo-text">WEIRDO TRACKER</div>
            </div>
            
            <div class="ticker" id="ticker">
                <div class="loading"><div class="spinner"></div>Loading market data...</div>
            </div>
            
            <div class="status">
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <span>LIVE</span>
                </div>
                <div class="time" id="clock">--:--:--</div>
            </div>
        </header>
        
        <!-- Left Sidebar - Token List -->
        <aside class="sidebar-left">
            <div class="sidebar-header">
                <div>Watchlist</div>
                <div class="sort-controls">
                    <button class="sort-btn active" onclick="sortTokens('default')">Default</button>
                    <button class="sort-btn" onclick="sortTokens('alpha')">A-Z <span class="sort-arrow">↓</span></button>
                    <button class="sort-btn" onclick="sortTokens('score')">Score <span class="sort-arrow">↓</span></button>
                    <button class="sort-btn" onclick="sortTokens('change')">24h% <span class="sort-arrow">↓</span></button>
                    <button class="sort-btn" onclick="sortTokens('mcap')">Mkt Cap <span class="sort-arrow">↓</span></button>
                    <button class="sort-btn" onclick="sortTokens('volume')">Volume <span class="sort-arrow">↓</span></button>
                    <button class="sort-btn" onclick="sortTokens('age')">Age <span class="sort-arrow">↓</span></button>
                </div>
            </div>
            <div class="token-list" id="tokenList">
                <div class="loading">Loading...</div>
            </div>
        </aside>
        
        <!-- Main Content - Chart Area -->
        <main class="main">
            <div class="chart-header">
                <div class="chart-title">
                    <div class="chart-title-icon" id="selectedIcon">📊</div>
                    <div class="chart-title-info">
                        <h2 id="selectedName">Select a Token</h2>
                        <span id="selectedMeta">Click a token from the watchlist</span>
                    </div>
                </div>
                <div class="chart-price">
                    <div class="chart-price-main" id="selectedPrice">--</div>
                    <div class="chart-price-change" id="selectedChange">--</div>
                </div>
            </div>
            
            <div class="chart-container">
                <div id="tradingview_chart" style="height: 550px; width: 100%; margin-bottom: 20px;"></div>
                
                <div class="chart-stats" style="margin-top: 0;">
                    <div class="chart-stat">
                        <div class="chart-stat-label">24h Volume</div>
                        <div class="chart-stat-value" id="statVolume">--</div>
                    </div>
                    <div class="chart-stat">
                        <div class="chart-stat-label">Liquidity</div>
                        <div class="chart-stat-value" id="statLiquidity">--</div>
                    </div>
                    <div class="chart-stat">
                        <div class="chart-stat-label">Market Cap</div>
                        <div class="chart-stat-value" id="statMcap">--</div>
                    </div>
                    <div class="chart-stat">
                        <div class="chart-stat-label">Score</div>
                        <div class="chart-stat-value" id="statScore" style="color: var(--accent);">--</div>
                    </div>
                </div>
            </div>
        </main>
        
        <!-- Right Sidebar - Opportunities -->
        <aside class="sidebar-right">
            <div class="opportunities-panel">
                <div class="panel-title">🔥 Top Opportunities</div>
                <div id="opportunitiesList">
                    <div class="loading">Analyzing...</div>
                </div>
            </div>
            
            <div class="alert-feed">
                <div class="panel-title">Recent Alerts</div>
                <div id="alertFeed">
                    <div class="alert-item">
                        <span class="alert-icon">ℹ️</span>
                        <div class="alert-content">
                            <div class="alert-text">Dashboard initialized. Waiting for data...</div>
                            <div class="alert-time">Just now</div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            dataUrl: 'https://raw.githubusercontent.com/jdhuman2021-web/weirdo-tracker/main/data/opportunities.json',
            refreshInterval: 300000, // 5 minutes
        };
        
        let currentData = null;
        let selectedToken = null;
        
        // Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = 
                now.toLocaleTimeString('en-US', { hour12: false, timeZone: 'UTC' }) + ' UTC';
        }
        setInterval(updateClock, 1000);
        updateClock();
        
        // Fetch Data
        async function fetchData() {
            try {
                const response = await fetch(CONFIG.dataUrl + '?t=' + Date.now());
                if (!response.ok) throw new Error('Data unavailable');
                const data = await response.json();
                currentData = data;
                renderAll();
            } catch (e) {
                console.error('Fetch error:', e);
                showError();
            }
        }
        
        // Render Functions
        function renderAll() {
            if (!currentData || !currentData.opportunities) return;
            
            renderTicker();
            renderTokenList();
            renderOpportunities();
            
            if (selectedToken) {
                updateSelectedView();
            } else if (currentData.opportunities.length > 0) {
                selectToken(currentData.opportunities[0]);
            }
        }
        
        function renderTicker() {
            const ops = currentData.opportunities || [];
            const tickerHTML = ops.map(token => {
                const change = token.price_change_24h >= 0 ? 'up' : 'down';
                const sign = token.price_change_24h >= 0 ? '+' : '';
                return `
                    <div class="ticker-item">
                        <span class="ticker-symbol">${token.symbol}</span>
                        <span class="ticker-price">$${formatPrice(token.price_usd)}</span>
                        <span class="ticker-change ${change}">${sign}${token.price_change_24h.toFixed(2)}%</span>
                    </div>
                `;
            }).join('') + ops.map(token => {
                const change = token.price_change_24h >= 0 ? 'up' : 'down';
                const sign = token.price_change_24h >= 0 ? '+' : '';
                return `
                    <div class="ticker-item">
                        <span class="ticker-symbol">${token.symbol}</span>
                        <span class="ticker-price">$${formatPrice(token.price_usd)}</span>
                        <span class="ticker-change ${change}">${sign}${token.price_change_24h.toFixed(2)}%</span>
                    </div>
                `;
            }).join('');
            
            document.getElementById('ticker').innerHTML = tickerHTML;
        }
        
        let currentSort = 'default';
        let sortDirection = {}; // Track direction per sort type
        
        function sortTokens(type) {
            // Toggle direction if clicking same sort
            if (currentSort === type) {
                sortDirection[type] = !sortDirection[type];
            } else {
                currentSort = type;
                if (sortDirection[type] === undefined) {
                    sortDirection[type] = false; // Default ascending
                }
            }
            
            // Update button states
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase().includes(type === 'default' ? 'default' : type)) {
                    btn.classList.add('active');
                }
            });
            
            // Update arrow direction
            updateSortArrows();
            
            renderTokenList();
        }
        
        function updateSortArrows() {
            document.querySelectorAll('.sort-btn').forEach(btn => {
                const arrow = btn.querySelector('.sort-arrow');
                if (!arrow) return;
                
                const btnType = btn.textContent.toLowerCase().includes('alpha') ? 'alpha' :
                               btn.textContent.toLowerCase().includes('score') ? 'score' :
                               btn.textContent.toLowerCase().includes('24h') ? 'change' :
                               btn.textContent.toLowerCase().includes('mkt') ? 'mcap' :
                               btn.textContent.toLowerCase().includes('volume') ? 'volume' :
                               btn.textContent.toLowerCase().includes('age') ? 'age' : 'default';
                
                if (arrow) {
                    arrow.textContent = sortDirection[btnType] ? '↑' : '↓';
                }
            });
        }
        
        function getSortedTokens() {
            if (!currentData || !currentData.opportunities) return [];
            
            const ops = [...currentData.opportunities];
            const dir = sortDirection[currentSort] ? -1 : 1; // false=asc, true=desc
            
            switch (currentSort) {
                case 'score':
                    return ops.sort((a, b) => (b.score - a.score) * dir);
                case 'change':
                    return ops.sort((a, b) => (b.price_change_24h - a.price_change_24h) * dir);
                case 'mcap':
                    return ops.sort((a, b) => (b.market_cap - a.market_cap) * dir);
                case 'volume':
                    return ops.sort((a, b) => (b.volume_24h - a.volume_24h) * dir);
                case 'alpha':
                    return ops.sort((a, b) => a.symbol.localeCompare(b.symbol) * dir);
                case 'age':
                    return ops.sort((a, b) => (new Date(a.added_date) - new Date(b.added_date)) * dir);
                default:
                    return ops;
            }
        }
        
        function renderTokenList() {
            const ops = getSortedTokens();
            const listHTML = ops.map(token => {
                const signalClass = getSignalClass(token.score);
                const changeClass = token.price_change_24h >= 0 ? 'up' : 'down';
                const changeSign = token.price_change_24h >= 0 ? '+' : '';
                const isActive = selectedToken && selectedToken.symbol === token.symbol ? 'active' : '';
                
                return `
                    <div class="token-list-item ${isActive}" onclick="selectTokenBySymbol('${token.symbol}')">
                        <div class="token-list-icon" style="background: ${getTokenGradient(token.symbol)}">${token.symbol[0]}</div>
                        <div class="token-list-info">
                            <div class="token-list-symbol">
                                ${token.symbol}
                                <span class="signal-dot ${signalClass}"></span>
                            </div>
                            <div class="token-list-price">$${formatPrice(token.price_usd)}</div>
                        </div>
                        <div class="token-list-change ${changeClass}">${changeSign}${token.price_change_24h.toFixed(1)}%</div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('tokenList').innerHTML = listHTML;
        }
        
        function renderOpportunities() {
            const ops = currentData.opportunities || [];
            const strongBuys = ops.filter(o => o.score >= 70);
            
            let html = '';
            
            strongBuys.slice(0, 8).forEach(token => {
                html += `
                    <div class="opportunity-card" onclick="selectTokenBySymbol('${token.symbol}')">
                        <div class="opportunity-header">
                            <span class="opportunity-symbol">${token.symbol}</span>
                            <span class="opportunity-score">${token.score}/100</span>
                        </div>
                        <div class="opportunity-reason">${token.reasons?.slice(0, 2).join(' • ') || 'Analyzing...'}</div>
                        <div class="opportunity-meta">
                            <span>${token.price_change_24h > 0 ? '+' : ''}${token.price_change_24h.toFixed(1)}% 24h</span>
                            <span>Vol: $${formatNumber(token.volume_24h)}</span>
                        </div>
                    </div>
                `;
            });
            
            if (html === '') {
                html = '<div class="loading">No strong signals right now</div>';
            }
            
            document.getElementById('opportunitiesList').innerHTML = html;
        }
        
        // Token Selection
        function selectTokenBySymbol(symbol) {
            const token = currentData.opportunities.find(o => o.symbol === symbol);
            if (token) selectToken(token);
        }
        
        function selectToken(token) {
            selectedToken = token;
            updateSelectedView();
            renderTokenList(); // Update active state
        }
        
        function updateSelectedView() {
            if (!selectedToken) return;
            
            document.getElementById('selectedIcon').textContent = selectedToken.symbol[0];
            document.getElementById('selectedIcon').style.background = getTokenGradient(selectedToken.symbol);
            document.getElementById('selectedName').textContent = `${selectedToken.symbol} / ${selectedToken.chain}`;
            document.getElementById('selectedMeta').textContent = `${selectedToken.name} • Score: ${selectedToken.score}/100 • ${selectedToken.signal}`;
            document.getElementById('selectedPrice').textContent = '$' + formatPrice(selectedToken.price_usd);
            
            const changeEl = document.getElementById('selectedChange');
            const change = selectedToken.price_change_24h;
            changeEl.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '% (24h)';
            changeEl.style.color = change >= 0 ? 'var(--accent)' : 'var(--danger)';
            
            document.getElementById('statVolume').textContent = '$' + formatNumber(selectedToken.volume_24h);
            document.getElementById('statLiquidity').textContent = '$' + formatNumber(selectedToken.liquidity_usd);
            document.getElementById('statMcap').textContent = '$' + formatNumber(selectedToken.market_cap);
            document.getElementById('statScore').textContent = selectedToken.score + '/100';
            
            // Load TradingView chart
            loadTradingViewChart(selectedToken);
        }
        
        function loadTradingViewChart(token) {
            // Use DexScreener iframe for Solana tokens
            const dexUrl = `https://dexscreener.com/solana/${token.address}?embed=true&theme=dark&chart=1`;
            
            document.getElementById('tradingview_chart').innerHTML = `
                <iframe 
                    src="${dexUrl}" 
                    frameborder="0" 
                    style="width: 100%; height: 600px; border: 0;"
                    allowtransparency="true"
                    loading="lazy">
                </iframe>
            `;
        }
        
        // Helpers
        function formatPrice(price) {
            if (!price || price === 0) return '0';
            if (price < 0.001) return price.toExponential(2);
            if (price < 1) return price.toFixed(6);
            return price.toFixed(4);
        }
        
        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toFixed(0);
        }
        
        function getSignalClass(score) {
            if (score >= 70) return 'signal-hot';
            if (score >= 50) return 'signal-warm';
            if (score >= 30) return 'signal-neutral';
            return 'signal-cold';
        }
        
        function getTokenGradient(symbol) {
            const gradients = {
                'MOMO': 'linear-gradient(135deg, #00ff88 0%, #00cc6a 100%)',
                'PIZZA': 'linear-gradient(135deg, #ffa502 0%, #ff6348 100%)',
                'JELLY': 'linear-gradient(135deg, #ffa502 0%, #ff9f43 100%)',
                'PUNCH': 'linear-gradient(135deg, #74b9ff 0%, #0984e3 100%)',
                'DEVIOUS': 'linear-gradient(135deg, #ff4757 0%, #ff6b81 100%)'
            };
            return gradients[symbol] || 'linear-gradient(135deg, #6b7280 0%, #9ca3af 100%)';
        }
        
        function showError() {
            document.getElementById('tokenList').innerHTML = '<div class="error">⚠️ Data unavailable<br><small>Push to GitHub to activate</small></div>';
            document.getElementById('opportunitiesList').innerHTML = '<div class="error">Waiting for data...</div>';
        }
        
        // Initialize
        fetchData();
        setInterval(fetchData, CONFIG.refreshInterval);
    </script>
</body>
</html>
