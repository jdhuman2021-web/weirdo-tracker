<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Weirdo Tracker v2.2 | Professional Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0b0d;
            --bg2: #0f1115;
            --bg3: #14171d;
            --bg4: #1a1e26;
            --border: rgba(255,255,255,0.06);
            --border2: rgba(255,255,255,0.1);
            --text: #e8eaf0;
            --muted: #6b7280;
            --muted2: #9ca3af;
            --green: #00ff88;
            --red: #ff4757;
            --amber: #ffa502;
            --cyan: #00d9ff;
            --accent: #00ff88;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; }
        .app { display: flex; height: 100vh; }
        .sidebar { width: 60px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 8px; }
        .nav-btn { width: 44px; height: 44px; border-radius: 10px; border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 20px; transition: all 0.2s; }
        .nav-btn:hover, .nav-btn.active { background: rgba(0,255,136,0.1); color: var(--accent); }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { height: 60px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 20px; }
        .panel { display: none; padding: 20px; overflow-y: auto; flex: 1; }
        .panel.active { display: block; }
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; background: var(--accent); color: var(--bg); }
        .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
        .btn:hover { opacity: 0.9; }
        .positive { color: var(--green); }
        .negative { color: var(--red); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--muted); font-size: 12px; cursor: pointer; }
        tr:hover { background: rgba(255,255,255,0.02); }
        .token-row { cursor: pointer; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; width: 500px; padding: 24px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-close { background: none; border: none; color: var(--muted); font-size: 24px; cursor: pointer; }
        input, select { width: 100%; padding: 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); margin: 8px 0; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--bg2); border: 1px solid var(--border); padding: 12px 20px; border-radius: 8px; transform: translateY(100px); transition: transform 0.3s; }
        .toast.show { transform: translateY(0); }
    </style>
</head>
<body>
    <div class="app">
        <nav class="sidebar">
            <div class="nav-btn active" onclick="showPanel('opportunities')">🎯</div>
            <div class="nav-btn" onclick="showPanel('portfolio')">💰</div>
            <div class="nav-btn" onclick="showPanel('whales')">🐋</div>
        </nav>
        <div class="main">
            <div class="topbar">
                <h1>🧠 Weirdo Tracker v2.2</h1>
                <div id="liveStatus" style="display:flex;align-items:center;gap:8px;color:var(--muted);">
                    <span style="width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1s infinite;"></span>
                    LIVE
                </div>
                <button class="btn" onclick="openModal()">+ Add Token</button>
                <button class="btn btn-secondary" onclick="document.getElementById('jsonFile').click()">Import JSON</button>
                <input type="file" id="jsonFile" style="display:none;" accept=".json" onchange="importJSON(event)">
            </div>

            <div class="panel active" id="panel-opportunities">
                <div class="card">
                    <h3>🎯 Smart Opportunities</h3>
                    <div id="opportunities-list"></div>
                </div>
            </div>

            <div class="panel" id="panel-portfolio">
                <div class="card">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                        <h3>💰 Portfolio</h3>
                        <div style="display:flex;gap:8px;">
                            <select id="chainFilter" onchange="filterPortfolio()">
                                <option value="ALL">All Chains</option>
                                <option value="SOL">SOL</option>
                                <option value="ETH">ETH</option>
                                <option value="BASE">BASE</option>
                            </select>
                            <select id="mcapFilter" onchange="filterPortfolio()">
                                <option value="ALL">All Caps</option>
                                <option value="micro">&lt;10M</option>
                                <option value="small">10-100M</option>
                                <option value="mid">100M-1B</option>
                                <option value="large">&gt;1B</option>
                            </select>
                        </div>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th onclick="sortBy('symbol')">Token ↕</th>
                                <th onclick="sortBy('change24h')">24h ↕</th>
                                <th onclick="sortBy('marketCap')">MCap ↕</th>
                                <th onclick="sortBy('liquidity')">Liq ↕</th>
                            </tr>
                        </thead>
                        <tbody id="portfolio-body"></tbody>
                    </table>
                </div>
            </div>

            <div class="panel" id="panel-whales">
                <div class="card">
                    <h3>🐋 Whale Wallets</h3>
                    <div id="whale-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal" onclick="closeModalOnBg(event)">
        <div class="modal">
            <div class="modal-header">
                <h3>+ Add Token</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <select id="modalChain">
                <option value="SOL">SOL</option>
                <option value="ETH">ETH</option>
                <option value="BASE">BASE</option>
            </select>
            <input type="text" id="modalAddress" placeholder="Contract address">
            <input type="text" id="modalSymbol" placeholder="Symbol (auto-filled)">
            <input type="text" id="modalName" placeholder="Name (auto-filled)">
            <input type="text" id="modalSource" placeholder="Source (e.g. Rick Telegram)">
            <button class="btn" onclick="addToken()">Add to Watchlist</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const TOKENS = [
            { symbol: 'PUNCH', name: 'パンチ', address: 'NV2RYH954cTJ3ckFUpvfqaQXU4ARqqDH3562nFSpump', chain: 'SOL', change24h: 21.18, marketCap: 14890000, liquidity: 743000 },
            { symbol: 'Jellybean', name: 'Jellybean', address: '412zDygnwP9DzitnQVgRKUFFTDmrYScFch6P2k39pump', chain: 'SOL', change24h: 0.96, marketCap: 670000, liquidity: 118000 },
            { symbol: 'LOBSTAR', name: 'Lobstar', address: '4TyZGqRLG3VcHTGMcLBoPUmqYitMVojXinAmkL8xpump', chain: 'SOL', change24h: 23.03, marketCap: 6922000, liquidity: 457000 }
        ];

        const WHALES = [
            { address: 'BtDaZUqHr2mKH5EYQCztuerHBuBEfQNYdquTDtEZp2Ym', name: 'SPECIAL1', emoji: '🐋' },
            { address: 'AfwNi3FBb1zFpBxMerawpq5fTf7vdGfSRQnfmkU8YT8h', name: 'Fish insider', emoji: '🐟' }
        ];

        function showPanel(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('panel-' + id).classList.add('active');
            event.target.classList.add('active');
        }

        function renderOpportunities() {
            const list = document.getElementById('opportunities-list');
            list.innerHTML = TOKENS.map(t => `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--bg3);border-radius:8px;margin-bottom:8px;cursor:pointer;" onclick="window.open('https://dexscreener.com/solana/${t.address}')">
                    <div style="display:flex;align-items:center;gap:12px;">
                        <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--green));display:flex;align-items:center;justify-content:center;font-weight:700;">${t.symbol[0]}</div>
                        <div>
                            <div style="font-weight:700;">${t.symbol}</div>
                            <div style="color:var(--muted);font-size:12px;">${t.name}</div>
                        </div>
                    </div>
                    <div style="text-align:right;">
                        <div class="${t.change24h >= 0 ? 'positive' : 'negative'}" style="font-weight:700;">${t.change24h >= 0 ? '+' : ''}${t.change24h.toFixed(1)}%</div>
                        <div style="color:var(--muted);font-size:12px;">$${(t.marketCap/1e6).toFixed(1)}M</div>
                    </div>
                </div>
            `).join('');
        }

        function renderPortfolio() {
            const tbody = document.getElementById('portfolio-body');
            tbody.innerHTML = TOKENS.map(t => `
                <tr class="token-row" onclick="window.open('https://dexscreener.com/solana/${t.address}')">
                    <td>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--green));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;">${t.symbol[0]}</div>
                            <div>
                                <div style="font-weight:700;">${t.symbol}</div>
                                <div style="color:var(--muted);font-size:12px;">${t.name}</div>
                            </div>
                        </div>
                    </td>
                    <td class="${t.change24h >= 0 ? 'positive' : 'negative'}">${t.change24h >= 0 ? '+' : ''}${t.change24h.toFixed(1)}%</td>
                    <td>$${(t.marketCap/1e6).toFixed(1)}M</td>
                    <td>$${(t.liquidity/1000).toFixed(0)}K</td>
                </tr>
            `).join('');
        }

        function renderWhales() {
            document.getElementById('whale-grid').innerHTML = WHALES.map(w => `
                <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;" onclick="window.open('https://birdeye.so/profile/${w.address}?chain=solana')">
                    <div style="font-size:24px;margin-bottom:8px;">${w.emoji}</div>
                    <div style="font-weight:700;">${w.name}</div>
                    <div style="color:var(--muted);font-size:12px;font-family:monospace;">${w.address.slice(0,6)}...${w.address.slice(-4)}</div>
                </div>
            `).join('');
        }

        function openModal() { document.getElementById('modal').classList.add('open'); }
        function closeModal() { document.getElementById('modal').classList.remove('open'); }
        function closeModalOnBg(e) { if(e.target.id === 'modal') closeModal(); }

        function addToken() {
            const symbol = document.getElementById('modalSymbol').value.toUpperCase();
            TOKENS.push({
                symbol: symbol,
                name: document.getElementById('modalName').value,
                address: document.getElementById('modalAddress').value,
                chain: document.getElementById('modalChain').value,
                change24h: 0,
                marketCap: 0,
                liquidity: 0
            });
            closeModal();
            renderAll();
            showToast(`${symbol} added!`);
        }

        function importJSON(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if(data.tracked_contracts) {
                        data.tracked_contracts.forEach(c => {
                            TOKENS.push({
                                symbol: c.symbol.toUpperCase(),
                                name: c.name,
                                address: c.address,
                                chain: c.chain || 'SOL',
                                change24h: 0, marketCap: 0, liquidity: 0
                            });
                        });
                    }
                    renderAll();
                    showToast('Imported successfully');
                } catch(err) {
                    showToast('Invalid JSON');
                }
            };
            reader.readAsText(file);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function renderAll() {
            renderOpportunities();
            renderPortfolio();
            renderWhales();
        }

        // Auto-refresh every 90s
        setInterval(() => {
            showToast('Refreshing data...');
        }, 90000);

        renderAll();
    </script>
</body>
</html>
