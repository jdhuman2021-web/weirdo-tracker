<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PunchTheLabubu.io</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 3px 3px 0 #ff006e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .scene {
            position: relative;
            width: 400px;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .labubu {
            width: 180px;
            height: 220px;
            position: relative;
            cursor: pointer;
            transition: transform 0.1s;
            animation: bounce 2s infinite ease-in-out;
        }

        .labubu:hover {
            transform: scale(1.05);
        }

        .labubu.hit {
            animation: punched 0.3s;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes punched {
            0% { transform: translateX(0) rotate(0); }
            20% { transform: translateX(-40px) rotate(-20deg); }
            40% { transform: translateX(30px) rotate(15deg); }
            60% { transform: translateX(-20px) rotate(-10deg); }
            80% { transform: translateX(10px) rotate(5deg); }
            100% { transform: translateX(0) rotate(0); }
        }

        /* Labubu body */
        .labubu-body {
            width: 140px;
            height: 160px;
            background: linear-gradient(145deg, #d4a574 0%, #c4956a 100%);
            border-radius: 70px 70px 60px 60px;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.1);
        }

        /* Ears */
        .ear {
            width: 35px;
            height: 50px;
            background: linear-gradient(145deg, #d4a574 0%, #c4956a 100%);
            border-radius: 50%;
            position: absolute;
            top: 40px;
            box-shadow: inset -3px -3px 8px rgba(0,0,0,0.1);
        }

        .ear.left {
            left: 15px;
            transform: rotate(-20deg);
        }

        .ear.right {
            right: 15px;
            transform: rotate(20deg);
        }

        .ear-inner {
            width: 20px;
            height: 30px;
            background: #ffdde8;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Face */
        .face {
            width: 100px;
            height: 90px;
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Eyes */
        .eye {
            width: 28px;
            height: 32px;
            background: #2d2d2d;
            border-radius: 50%;
            position: absolute;
            top: 15px;
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.3);
        }

        .eye.left { left: 15px; }
        .eye.right { right: 15px; }

        .eye-shine {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 6px;
            left: 6px;
        }

        /* Nose */
        .nose {
            width: 12px;
            height: 8px;
            background: #2d2d2d;
            border-radius: 50%;
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Mouth */
        .mouth {
            width: 30px;
            height: 15px;
            border-bottom: 4px solid #2d2d2d;
            border-radius: 0 0 15px 15px;
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Cheeks */
        .cheek {
            width: 18px;
            height: 10px;
            background: #ffb6c1;
            border-radius: 50%;
            position: absolute;
            top: 48px;
            opacity: 0.6;
        }

        .cheek.left { left: 5px; }
        .cheek.right { right: 5px; }

        /* Arms */
        .arm {
            width: 30px;
            height: 50px;
            background: linear-gradient(145deg, #d4a574 0%, #c4956a 100%);
            border-radius: 20px;
            position: absolute;
            top: 120px;
        }

        .arm.left {
            left: 0;
            transform: rotate(30deg);
        }

        .arm.right {
            right: 0;
            transform: rotate(-30deg);
        }

        /* Legs */
        .leg {
            width: 35px;
            height: 40px;
            background: linear-gradient(145deg, #d4a574 0%, #c4956a 100%);
            border-radius: 20px;
            position: absolute;
            bottom: 0;
        }

        .leg.left {
            left: 30px;
        }

        .leg.right {
            right: 30px;
        }

        /* Feet */
        .foot {
            width: 40px;
            height: 20px;
            background: #c4956a;
            border-radius: 20px 20px 10px 10px;
            position: absolute;
            bottom: 0;
        }

        .foot.left { left: 25px; }
        .foot.right { right: 25px; }

        /* Hair */
        .hair {
            width: 80px;
            height: 30px;
            background: #2d2d2d;
            border-radius: 50px 50px 0 0;
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Crown/Horn */
        .horn {
            width: 15px;
            height: 35px;
            background: linear-gradient(145deg, #ffd700 0%, #ffaa00 100%);
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
        }

        .horn::after {
            content: '';
            width: 20px;
            height: 20px;
            background: #ffd700;
            border-radius: 50%;
            position: absolute;
            top: -10px;
            left: -2px;
        }

        /* Pain face states */
        .labubu.sad .eye {
            transform: scaleY(0.5);
            height: 15px;
        }

        .labubu.sad .mouth {
            border-bottom: none;
            border-top: 4px solid #2d2d2d;
            border-radius: 15px 15px 0 0;
            top: 65px;
        }

        .labubu.sad .cheek {
            display: none;
        }

        .punch-btn {
            background: #ff006e;
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 1.5rem;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.1s;
            box-shadow: 0 10px 0 #990046;
        }

        .punch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 0 #990046;
        }

        .punch-btn:active {
            transform: translateY(10px);
            box-shadow: 0 0 0 #990046;
        }

        .message-box {
            margin-top: 20px;
            min-height: 50px;
            text-align: center;
            padding: 12px 25px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 1rem;
            max-width: 450px;
        }

        .stats {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            color: #888;
            font-size: 0.8rem;
        }

        .stats span {
            color: #ff006e;
            font-size: 1.2rem;
        }

        .effect {
            position: absolute;
            font-size: 40px;
            pointer-events: none;
            animation: splatter 0.4s ease-out forwards;
        }

        @keyframes splatter {
            0% { opacity: 1; transform: translate(0, 0) scale(1.5); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.5); }
        }

        .title-redirect {
            font-size: 0.8rem;
            color: #666;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="stats">
        Punches: <span id="punch-count">0</span>
    </div>

    <h1>PunchTheLabubu.io</h1>
    <p class="subtitle">Sometimes you just need to punch a Labubu.</p>

    <div class="scene">
        <div class="labubu" id="labubu" onclick="punchLabubu()">
            <div class="horn"></div>
            <div class="hair"></div>
            <div class="ear left"><div class="ear-inner"></div></div>
            <div class="ear right"><div class="ear-inner"></div></div>
            <div class="labubu-body"></div>
            <div class="face">
                <div class="eye left"><div class="eye-shine"></div></div>
                <div class="eye right"><div class="eye-shine"></div></div>
                <div class="nose"></div>
                <div class="cheek left"></div>
                <div class="cheek right"></div>
                <div class="mouth"></div>
            </div>
            <div class="arm left"></div>
            <div class="arm right"></div>
            <div class="leg left"><div class="foot left"></div></div>
            <div class="leg right"><div class="foot right"></div></div>
        </div>
    </div>

    <button class="punch-btn" id="punch-btn" onclick="punchLabubu()">
        👊 PUNCH LABUBU
    </button>

    <div class="message-box" id="message">
        Go ahead. You know you want to.
    </div>

    <p class="title-redirect">Domain coming soon: punchthelabubu.io</p>

    <script>
        let punchCount = 0;
        const messages = [
            "Feel better? Good.",
            "Labubu wobbles but stays standing.",
            "Somewhere, a collector cries.",
            "Keep going. No one's stopping you.",
            "This is oddly satisfying.",
            "Labubu: 'why?'",
            "The fur absorbs your rage.",
            "Another punch, another dollar.",
            "You're not a bad person. You're just frustrated.",
            "Labubu deserves it. Probably.",
            "One more won't hurt.",
            "The cycle of violence continues.",
            "Clicking feels good, doesn't it?",
            "You've gone too far to stop now.",
            "Labubu knew the risks when it was made.",
            "This is your therapy session.",
            "Emotional damage is real.",
            "The labubu has been punched 69420 times.",
            "You're the monster now.",
            "Keep clicking. No judgment."
        ];

        function punchLabubu() {
            punchCount++;
            document.getElementById('punch-count').textContent = punchCount;

            const labubu = document.getElementById('labubu');
            const message = document.getElementById('message');

            // Hit animation
            labubu.classList.add('hit');
            setTimeout(() => labubu.classList.remove('hit'), 300);

            // Sad face after punches
            if (punchCount >= 5) {
                labubu.classList.add('sad');
            }

            // Effects
            spawnEffect();

            // Random message
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            message.textContent = randomMsg;

            // Background flash
            document.body.style.background = `linear-gradient(${Math.random() * 360}deg, #1a1a2e 0%, #16213e 100%)`;
            setTimeout(() => {
                document.body.style.background = 'linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)';
            }, 100);

            // Progress to dark ending
            if (punchCount >= 10 && punchCount < 20) {
                message.style.color = '#ff6b6b';
                message.style.background = 'rgba(255,107,107,0.2)';
            } else if (punchCount >= 20) {
                message.style.color = '#ff0000';
                message.style.background = 'rgba(255,0,0,0.3)';
                message.textContent = "YOU CAN'T STOP NOW. THE LABUBU DEMANDS SACRIFICE.";
            }
        }

        function spawnEffect() {
            const scene = document.querySelector('.scene');
            const effects = ['💥', '👊', '💢', '🩹', '😵', '💫', '🥊', '🤕'];
            const effect = document.createElement('div');
            effect.className = 'effect';
            effect.textContent = effects[Math.floor(Math.random() * effects.length)];
            effect.style.left = '50%';
            effect.style.top = '40%';
            effect.style.setProperty('--tx', `${(Math.random() - 0.5) * 300}px`);
            effect.style.setProperty('--ty', `${(Math.random() - 0.5) * 300}px`);
            scene.appendChild(effect);
            setTimeout(() => effect.remove(), 400);
        }
    </script>
</body>
</html>
